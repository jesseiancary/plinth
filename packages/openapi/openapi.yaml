components:
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              description: Additional error context
              additionalProperties: true

    User:
      type: object
      required:
        - id
        - email
        - name
        - createdAt
      properties:
        id:
          type: string
          description: User ID
        email:
          type: string
          format: email
          description: User email address
        name:
          type: string
          description: User full name
        createdAt:
          type: string
          format: date-time
          description: Account creation timestamp

    Organization:
      type: object
      required:
        - id
        - name
        - slug
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Organization ID
        name:
          type: string
          description: Organization display name
        slug:
          type: string
          description: URL-safe unique identifier
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    Membership:
      type: object
      required:
        - id
        - role
        - userId
        - user
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Membership ID
        role:
          type: string
          enum: [OWNER, ADMIN, MEMBER]
          description: Member role
        userId:
          type: string
          description: User ID
        user:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
          description: Membership creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    Invitation:
      type: object
      required:
        - id
        - email
        - role
        - status
        - expiresAt
        - createdAt
      properties:
        id:
          type: string
          description: Invitation ID
        email:
          type: string
          format: email
          description: Invitee email address
        role:
          type: string
          enum: [OWNER, ADMIN, MEMBER]
          description: Role to be assigned
        status:
          type: string
          enum: [PENDING, ACCEPTED, REVOKED, EXPIRED]
          description: Invitation status
        expiresAt:
          type: string
          format: date-time
          description: Expiration timestamp
        acceptedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
          description: Acceptance timestamp
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp

    ApiKey:
      type: object
      required:
        - id
        - name
        - scopes
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: API key ID
        name:
          type: string
          description: Human-readable key name
        scopes:
          type: array
          items:
            type: string
          description: Array of granted scopes
        lastUsedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
          description: Last usage timestamp
        revokedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
          description: Revocation timestamp
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp

    PaginatedResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items: {}
        nextCursor:
          oneOf:
            - type: string
            - type: 'null'
          description: Cursor for next page (null if no more pages)

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

    apiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API key (format sk_live_...)

security:
  - bearerAuth: []
  - apiKeyAuth: []

tags:
  - name: Health
    description: Health check endpoints
  - name: Auth
    description: Authentication endpoints
  - name: Organizations
    description: Organization management
  - name: Members
    description: Team member management
  - name: Invitations
    description: Team invitation management
  - name: API Keys
    description: API key management
