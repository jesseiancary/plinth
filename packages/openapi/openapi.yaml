  /api/v1/invitations/validate/{token}:
    get:
      summary: Validate invitation token
      description: |
        Validate an invitation token and return invitation details (public endpoint).

        Use this endpoint to check if an invitation is valid before prompting the user to accept it.

        **Security Note:** This endpoint is public and returns organization information.
        It is rate-limited to prevent enumeration attacks. Repeated validation attempts
        may require additional verification.

        No authentication required - the token itself serves as proof of access.
      operationId: validateInvitation
      tags:
        - Invitations
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Invitation token
      responses:
        '200':
          description: Invitation is valid
          content:
            application/json:
              schema:
                type: object
                required:
                  - email
                  - role
                  - organization
                  - expiresAt
                properties:
                  email:
                    type: string
                    format: email
                  role:
                    type: string
                    enum: [OWNER, ADMIN, MEMBER]
                  organization:
                    type: object
                    required:
                      - name
                      - slug
                    properties:
                      name:
                        type: string
                      slug:
                        type: string
                  expiresAt:
                    type: string
                    format: date-time
        '404':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidToken:
                  summary: Token does not exist or is malformed
                  value:
                    error:
                      code: INVALID_TOKEN
                      message: Invalid invitation token
                      details: {}
        '410':
          description: Invitation expired, revoked, or already accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invitationExpired:
                  summary: Invitation has expired
                  value:
                    error:
                      code: INVITATION_EXPIRED
                      message: Invitation has expired
                      details: {}
                invitationRevoked:
                  summary: Invitation was revoked by admin
                  value:
                    error:
                      code: INVITATION_REVOKED
                      message: Invitation has been revoked
                      details: {}
                alreadyAccepted:
                  summary: Invitation has already been accepted
                  value:
                    error:
                      code: INVITATION_ALREADY_ACCEPTED
                      message: Invitation has already been accepted
                      details: {}

