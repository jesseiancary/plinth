openapi: 3.1.0
info:
  title: Plinth API
  version: 1.0.0
  description: Production-grade multi-tenant SaaS API
  contact:
    name: Plinth Team
    url: https://github.com/jesseiancary/plinth

servers:
  - url: http://localhost:3000
    description: Development
  - url: https://api.plinth.dev
    description: Production

paths:
  /health:
    get:
      summary: Health check
      description: Check API and database connectivity status
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                  - database
                properties:
                  status:
                    type: string
                    enum: [ok]
                  timestamp:
                    type: string
                    format: date-time
                  database:
                    type: string
                    enum: [connected]
              examples:
                healthy:
                  summary: Service healthy
                  value:
                    status: ok
                    timestamp: '2026-05-28T14:32:15.123Z'
                    database: connected
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                  - database
                properties:
                  status:
                    type: string
                    enum: [error]
                  timestamp:
                    type: string
                    format: date-time
                  database:
                    type: string
                    enum: [disconnected]
              examples:
                unhealthy:
                  summary: Database connection failed
                  value:
                    status: error
                    timestamp: '2026-05-28T14:32:15.123Z'
                    database: disconnected

  /api/v1/auth/register:
    post:
      summary: Register new user
      description: Create a new user account and personal organization
      operationId: register
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  description: User email address
                password:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 128
                  description: User password (min 8 characters)
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: User full name
            examples:
              newUser:
                summary: Register new user
                value:
                  email: sarah.chen@example.com
                  password: 'MyS3cur3P@ssw0rd!'
                  name: Sarah Chen
      responses:
        '201':
          description: User created successfully
          headers:
            Set-Cookie:
              schema:
                type: string
                example: refreshToken=...; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                type: object
                required:
                  - accessToken
                  - user
                properties:
                  accessToken:
                    type: string
                    description: JWT access token
                  user:
                    $ref: '#/components/schemas/User'
              examples:
                userCreated:
                  summary: User registered successfully
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJ1c3JfNGtMOG1OMnBROXZSNndZM3NGN3RYMSIsImlhdCI6MTcxNjg5MzIwMCwiZXhwIjoxNzE2ODk0MTAwfQ.signature
                    user:
                      id: usr_4kL8mN2pQ9vR6wY3sF7tX1
                      email: sarah.chen@example.com
                      name: Sarah Chen
                      createdAt: '2026-05-28T14:32:15.123Z'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                passwordTooShort:
                  summary: Password validation failed
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: Validation failed
                      details:
                        password: Password must be at least 8 characters
                invalidEmail:
                  summary: Invalid email format
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: Validation failed
                      details:
                        email: Invalid email format
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                emailExists:
                  summary: Email already registered
                  value:
                    error:
                      code: EMAIL_EXISTS
                      message: Email already registered
                      details: {}

  /api/v1/auth/login:
    post:
      summary: Login user
      description: Authenticate user and return access token
      operationId: login
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: User email address
                password:
                  type: string
                  format: password
                  description: User password
            examples:
              validLogin:
                summary: Login with email and password
                value:
                  email: sarah.chen@example.com
                  password: 'MyS3cur3P@ssw0rd!'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: refreshToken=...; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                type: object
                required:
                  - accessToken
                  - user
                properties:
                  accessToken:
                    type: string
                    description: JWT access token
                  user:
                    $ref: '#/components/schemas/User'
              examples:
                loginSuccess:
                  summary: Login successful
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJ1c3JfNGtMOG1OMnBROXZSNndZM3NGN3RYMSIsImlhdCI6MTcxNjg5MzIwMCwiZXhwIjoxNzE2ODk0MTAwfQ.signature
                    user:
                      id: usr_4kL8mN2pQ9vR6wY3sF7tX1
                      email: sarah.chen@example.com
                      name: Sarah Chen
                      createdAt: '2026-05-15T09:23:41.123Z'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCredentials:
                  summary: Wrong password or email not found
                  value:
                    error:
                      code: INVALID_CREDENTIALS
                      message: Invalid credentials
                      details: {}

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      description: |
        Use the httpOnly refresh token cookie to obtain a new access token.

        The refresh token is automatically sent via cookie - no request body required.

        This endpoint rotates the refresh token (issues a new one and invalidates the old one).

        Call this endpoint before your access token expires (15 minute lifetime).
      operationId: refreshToken
      tags:
        - Auth
      security: []
      responses:
        '200':
          description: Token refreshed successfully
          headers:
            Set-Cookie:
              schema:
                type: string
                example: refreshToken=...; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                type: object
                required:
                  - accessToken
                properties:
                  accessToken:
                    type: string
                    description: New JWT access token
              examples:
                tokenRefreshed:
                  summary: New access token issued
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJ1c3JfNGtMOG1OMnBROXZSNndZM3NGN3RYMSIsImlhdCI6MTcxNjg5NDIwMCwiZXhwIjoxNzE2ODk1MTAwfQ.new_signature
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingToken:
                  summary: No refresh token cookie provided
                  value:
                    error:
                      code: REFRESH_TOKEN_MISSING
                      message: Refresh token not found
                      details: {}
                invalidToken:
                  summary: Refresh token signature invalid
                  value:
                    error:
                      code: INVALID_REFRESH_TOKEN
                      message: Invalid refresh token
                      details: {}
                expiredToken:
                  summary: Refresh token has expired (7 day lifetime)
                  value:
                    error:
                      code: REFRESH_TOKEN_EXPIRED
                      message: Refresh token expired
                      details: {}

  /api/v1/auth/logout:
    post:
      summary: Logout user
      description: |
        Invalidate the current refresh token and clear the httpOnly cookie.

        The access token remains valid until it expires (15 minutes from issue).

        After logout, the refresh token can no longer be used to obtain new access tokens.
      operationId: logout
      tags:
        - Auth
      security: []
      responses:
        '204':
          description: Logout successful

  /api/v1/auth/me:
    get:
      summary: Get current user
      description: Get currently authenticated user with their memberships
      operationId: getCurrentUser
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - email
                  - name
                  - createdAt
                  - memberships
                properties:
                  id:
                    type: string
                    description: User ID
                  email:
                    type: string
                    format: email
                    description: User email
                  name:
                    type: string
                    description: User name
                  createdAt:
                    type: string
                    format: date-time
                    description: Account creation timestamp
                  memberships:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - role
                        - organization
                        - createdAt
                      properties:
                        id:
                          type: string
                        role:
                          type: string
                          enum: [OWNER, ADMIN, MEMBER]
                        organization:
                          type: object
                          required:
                            - id
                            - name
                            - slug
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            slug:
                              type: string
                        createdAt:
                          type: string
                          format: date-time
              examples:
                currentUserWithMemberships:
                  summary: User with multiple organizations
                  value:
                    id: usr_4kL8mN2pQ9vR6wY3sF7tX1
                    email: sarah.chen@example.com
                    name: Sarah Chen
                    createdAt: '2026-05-15T09:23:41.123Z'
                    memberships:
                      - id: mem_9zX2pL5qK8vN4wR7tY3sF6
                        role: OWNER
                        organization:
                          id: org_2mK9x3pQ7nL4vB8wR1tY6sF5
                          name: Acme Engineering
                          slug: acme-engineering
                        createdAt: '2026-05-15T09:23:41.123Z'
                      - id: mem_5pL3qK7vN2wR9tY4sF8xB1
                        role: ADMIN
                        organization:
                          id: org_8nM6pQ4vR1wY7sF2tX5kL9
                          name: Beta Labs
                          slug: beta-labs
                        createdAt: '2026-05-20T11:14:52.456Z'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notAuthenticated:
                  summary: No access token provided or token invalid
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Authentication required
                      details: {}

  /api/v1/auth/password:
    patch:
      summary: Change password
      description: |
        Change the user's password. This operation:
        - Validates the current password
        - Enforces strong password policy (8+ chars, uppercase, lowercase, number, special char)
        - Increments tokenVersion to invalidate ALL existing sessions across all devices
        - Clears the refresh token cookie

        **Security Note:** All active sessions will be terminated. User must log in again with the new password.
      operationId: changePassword
      tags:
        - Auth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  minLength: 1
                  description: User's current password for verification
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
                  pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$'
                  description: New password (must contain uppercase, lowercase, number, special character)
            examples:
              passwordChange:
                summary: Change password request
                value:
                  currentPassword: OldP@ssword123
                  newPassword: NewSecureP@ss456
      responses:
        '204':
          description: Password changed successfully, all sessions invalidated
        '400':
          description: Validation error (weak password)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                weakPassword:
                  summary: New password doesn't meet requirements
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: Validation failed
                      details:
                        issues:
                          - code: invalid_string
                            message: Password must contain at least one uppercase letter
                            path: ['newPassword']
        '401':
          description: Current password is incorrect or not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidPassword:
                  summary: Current password is incorrect
                  value:
                    error:
                      code: INVALID_PASSWORD
                      message: Current password is incorrect
                      details: {}
                notAuthenticated:
                  summary: No access token provided
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Authentication required
                      details: {}

  /api/v1/orgs:
    post:
      summary: Create organization
      description: Create a new organization and automatically assign caller as OWNER
      operationId: createOrganization
      tags:
        - Organizations
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Organization display name
                slug:
                  type: string
                  minLength: 3
                  maxLength: 63
                  pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
                  description: URL-safe unique identifier
            examples:
              teamOrg:
                summary: Create team organization
                value:
                  name: Acme Engineering
                  slug: acme-engineering
              personalWorkspace:
                summary: Create personal workspace
                value:
                  name: Sarah Chen's Workspace
                  slug: sarah-chen-workspace
      responses:
        '201':
          description: Organization created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                  - slug
                  - createdAt
                  - updatedAt
                  - membership
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  slug:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                  membership:
                    type: object
                    required:
                      - id
                      - role
                      - createdAt
                    properties:
                      id:
                        type: string
                      role:
                        type: string
                        enum: [OWNER]
                      createdAt:
                        type: string
                        format: date-time
              examples:
                orgCreated:
                  summary: Organization created successfully
                  value:
                    id: org_2mK9x3pQ7nL4vB8wR1tY6sF5
                    name: Acme Engineering
                    slug: acme-engineering
                    createdAt: '2026-05-28T14:35:22.456Z'
                    updatedAt: '2026-05-28T14:35:22.456Z'
                    membership:
                      id: mem_9zX2pL5qK8vN4wR7tY3sF6
                      role: OWNER
                      createdAt: '2026-05-28T14:35:22.456Z'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidSlug:
                  summary: Invalid slug format
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: Validation failed
                      details:
                        slug: Slug must contain only lowercase letters, numbers, and hyphens
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notAuthenticated:
                  summary: No access token provided
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Authentication required
                      details: {}
        '409':
          description: Slug already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                slugExists:
                  summary: Organization slug already taken
                  value:
                    error:
                      code: ORG_SLUG_EXISTS
                      message: Organization slug already exists
                      details: {}

  /api/v1/orgs/{slug}:
    get:
      summary: Get organization details
      description: Get organization details (requires membership)
      operationId: getOrganization
      tags:
        - Organizations
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Organization slug
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
              examples:
                orgDetails:
                  summary: Organization details
                  value:
                    id: org_2mK9x3pQ7nL4vB8wR1tY6sF5
                    name: Acme Engineering
                    slug: acme-engineering
                    createdAt: '2026-05-15T09:23:41.123Z'
                    updatedAt: '2026-05-28T14:35:22.456Z'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notAuthenticated:
                  summary: No access token provided
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Authentication required
                      details: {}
        '404':
          description: Organization not found or not a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                orgNotFound:
                  summary: Organization not found or user not a member
                  value:
                    error:
                      code: ORG_NOT_FOUND
                      message: Organization not found
                      details: {}

    patch:
      summary: Update organization
      description: Update organization name and/or slug (requires ADMIN role)
      operationId: updateOrganization
      tags:
        - Organizations
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Organization slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  description: Organization display name
                slug:
                  type: string
                  minLength: 3
                  maxLength: 63
                  pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
                  description: URL-safe unique identifier
            examples:
              renameOrg:
                summary: Rename organization
                value:
                  name: Acme Corporation
              changeSlug:
                summary: Change organization slug
                value:
                  slug: acme-corp
              updateBoth:
                summary: Update name and slug
                value:
                  name: Acme Corporation
                  slug: acme-corp
      responses:
        '200':
          description: Organization updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
              examples:
                orgUpdated:
                  summary: Organization updated successfully
                  value:
                    id: org_2mK9x3pQ7nL4vB8wR1tY6sF5
                    name: Acme Corporation
                    slug: acme-corp
                    createdAt: '2026-05-15T09:23:41.123Z'
                    updatedAt: '2026-05-28T15:42:18.789Z'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidSlug:
                  summary: Invalid slug format
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: Validation failed
                      details:
                        slug: Slug must contain only lowercase letters, numbers, and hyphens
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notAuthenticated:
                  summary: No access token provided
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Authentication required
                      details: {}
        '403':
          description: Insufficient permissions (requires ADMIN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  summary: User does not have ADMIN role
                  value:
                    error:
                      code: FORBIDDEN
                      message: Insufficient permissions
                      details: {}
        '404':
          description: Organization not found or not a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                orgNotFound:
                  summary: Organization not found
                  value:
                    error:
                      code: ORG_NOT_FOUND
                      message: Organization not found
                      details: {}
        '409':
          description: Slug already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                slugExists:
                  summary: New slug already taken
                  value:
                    error:
                      code: ORG_SLUG_EXISTS
                      message: Organization slug already exists
                      details: {}

    delete:
      summary: Delete organization
      description: |
        Delete organization and all associated data (requires OWNER role).

        WARNING: This is a destructive operation that will cascade delete:
        - All memberships
        - All invitations (pending and accepted)
        - All API keys
        - All organization data

        This action cannot be undone.
      operationId: deleteOrganization
      tags:
        - Organizations
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Organization slug
      responses:
        '204':
          description: Organization deleted successfully
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notAuthenticated:
                  summary: No access token provided
                  value:
                    error:
                      code: UNAUTHENTICATED
                      message: Authentication required
                      details: {}
        '403':
          description: Insufficient permissions (requires OWNER)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                forbidden:
                  summary: User does not have OWNER role
                  value:
                    error:
                      code: FORBIDDEN
                      message: Insufficient permissions
                      details: {}
        '404':
          description: Organization not found or not a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                orgNotFound:
                  summary: Organization not found
                  value:
                    error:
                      code: ORG_NOT_FOUND
                      message: Organization not found
                      details: {}

  /api/v1/orgs/{slug}/members:
    get:
      summary: List organization members
      description: List all members of an organization with pagination (requires MEMBER role)
      operationId: listMembers
      tags:
        - Members
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Organization slug
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Pagination cursor
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - nextCursor
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Membership'
                  nextCursor:
                    oneOf:
                      - type: string
                      - type: 'null'
              examples:
                firstPage:
                  summary: First page with 2 members
                  value:
                    data:
                      - id: mem_9zX2pL5qK8vN4wR7tY3sF6
                        role: OWNER
                        userId: usr_4kL8mN2pQ9vR6wY3sF7tX1
                        user:
                          id: usr_4kL8mN2pQ9vR6wY3sF7tX1
                          email: sarah.chen@example.com
                          name: Sarah Chen
                          createdAt: '2026-05-15T09:23:41.123Z'
                        createdAt: '2026-05-15T09:23:41.123Z'
                        updatedAt: '2026-05-15T09:23:41.123Z'
                      - id: mem_5pL3qK7vN2wR9tY4sF8xB1
                        role: ADMIN
